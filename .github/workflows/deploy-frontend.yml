name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'DropchipAI/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'DropchipAI/frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build:
    name: Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Node 20 LTS required for serialize-javascript@7.x (uses crypto API)
          # Cache disabled to prevent stale/corrupt cache build failures

      - name: Install dependencies
        working-directory: DropchipAI/frontend
        run: npm install --legacy-peer-deps

      - name: Run tests
        working-directory: DropchipAI/frontend
        run: npm test -- --watchAll=false --passWithNoTests
        continue-on-error: true

      - name: Build (production)
        working-directory: DropchipAI/frontend
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

# Deployment wird automatisch von Vercel via GitHub-Integration durchgeführt.
# Kein manueller Vercel-CLI-Deploy notwendig.
